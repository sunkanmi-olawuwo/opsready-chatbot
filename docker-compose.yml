services:
  backend:
    image: python:3.11-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      AGENT_PROVIDER: local
      KNOWLEDGE_PROVIDER: local
      PROMPT_DIRECTORY: ../prompts
      SAMPLE_DOCS_DIRECTORY: ../data/sample-docs

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sh -c "corepack enable && pnpm install && pnpm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
